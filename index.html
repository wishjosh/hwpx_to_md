    <input type="file" id="fileInput" accept=".hwpx,.hwp">

    <div class="status" id="status"></div>

    <div class="result" id="result">
      <div class="result-actions">
        <button class="btn-download" id="downloadBtn">📥 다운로드</button>
        <button class="btn-copy" id="copyBtn">📋 클립보드 복사</button>
        <button class="btn-reset" id="resetBtn">↩ 초기화</button>
      </div>
      
      <!-- 프리뷰 탭 -->
      <div class="editor-header">
        <div class="preview-tabs">
          <button class="tab-btn active" data-tab="raw">📝 에디터</button>
          <button class="tab-btn" data-tab="rendered">👁️ 프리뷰 (HTML)</button>
          <button class="tab-btn" data-tab="split">📊 나란히 보기</button>
        </div>
        <div class="stats-badge" id="statsBadge">0자 (0단어)</div>
      </div>

      <!-- 프리뷰 영역 -->
      <div class="preview-content" id="previewContent">
        <div class="preview-pane active" id="paneRaw">
          <textarea class="preview-editor" id="previewEditor" placeholder="여기에 마크다운을 직접 입력하거나 수정해보세요..."></textarea>
        </div>
        <div class="preview-pane" id="paneRendered">
          <div class="preview-rendered" id="previewRendered"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">doc2md — 연구원 보고서 HWPX를 Markdown으로 변환</div>
</div>

</body>
</html>
